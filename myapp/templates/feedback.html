{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обратная связь — Поиск Жилья</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(rgba(17, 24, 39, 0.85), rgba(17, 24, 39, 0.85)), url('{% static "images/картинка фона7.jpg" %}');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        .feedback-card {
            background: rgba(70, 68, 68, 0.598);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px;
            max-width: 550px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            color: #d1d5db;
        }

        .btn-back {
            display: inline-flex;
            color: #9ca3af;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            transition: all 0.2s ease;
        }

        .btn-back:hover { color: #ffffff; background: rgba(255, 255, 255, 0.08); }
        h2 { color: #ffffff; font-size: 26px; margin: 24px 0 8px 0; }
        .subtitle { color: #38bdf8; font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 25px; }
        
        .form-group { margin-bottom: 18px; display: flex; flex-direction: column; }
        label { font-size: 14px; font-weight: 500; color: #9ca3af; margin-bottom: 6px; }
        
        input, textarea {
            width: 100%; padding: 12px; font-size: 15px; background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; color: white;
            box-sizing: border-box; outline: none; transition: border-color 0.2s;
        }
        input:focus, textarea:focus { border-color: #38bdf8; }
        textarea { resize: vertical; min-height: 120px; }

        .btn-submit {
            width: 100%; padding: 14px; background: #38bdf8; color: #111827; border: none;
            border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px;
            transition: background 0.2s;
        }
        .btn-submit:hover { background: #0ea5e9; }

        .success-box {
            background: rgba(52, 211, 153, 0.1); border: 1px solid rgba(52, 211, 153, 0.2);
            color: #34d399; padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 20px; font-size: 15px;
        }
    </style>
</head>
<body>

    <div class="feedback-card">
        <a href="{% url 'home' %}" class="btn-back">← На главную</a>
        
        <h2>Обратная связь</h2>
        <div class="subtitle">Напишите нам сообщение</div>

        {% if success %}
            <div class="success-box">
                🎉 Спасибо! Ваше сообщение успешно отправлено администрации сайта.
            </div>
        {% endif %}

        <form method="POST" novalidate>
            {% csrf_token %}

            <div class="form-group">
                <label>Ваше имя</label>
                <input type="text" name="name" required placeholder="Введите ваше имя" value="{{ request.user.username|default:'' }}">
            </div>

            <div class="form-group">
                <label>Электронная почта</label>
                <input type="email" name="email" required placeholder="example@mail.com" value="{{ request.user.email|default:'' }}">
            </div>

            <div class="form-group">
                <label>Тема обращения</label>
                <input type="text" name="subject" required placeholder="Вопрос по бронированию, предложение и т.д.">
            </div>

            <div class="form-group">
                <label>Текст сообщения</label>
                <textarea name="message" required placeholder="Напишите здесь ваш текст..."></textarea>
            </div>

            <button type="submit" class="btn-submit">Отправить сообщение</button>
        </form>
    </div>

</body>
</html>
