{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Поиск отелей{% endblock %}</title>
    <link rel="shortcut icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
    <link href="{% static 'style.css' %}"> rel="stylesheet">
    <style>
        html, body { height: 100%; display: flex; flex-direction: column; }
        .content-wrapper { flex: 1 0 auto; }
        footer { flex-shrink: 0; background-color: #212529; color: #fff; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>

    <!-- Контент страницы -->
    <div class="content-wrapper">
        {% block content %}
        {% endblock %}
    </div>

    <!-- Общий футер сайта -->
    <footer class="py-4 mt-auto">
        <div class="container text-center">
            <p class="mb-2">&copy; 2026 MYAPP — Сервис поиска и бронирования отелей.</p>
            <div class="d-flex justify-content-center gap-3">
                <a href="/about/" class="text-white-50 text-decoration-none">О нас</a>
                <a href="/contacts/" class="text-white-50 text-decoration-none">Контакты</a>
                <a href="/promo/" class="text-white-50 text-decoration-none">Акции</a>
            </div>
        </div>
    </footer>

    <script src="https://jsdelivr.net"></script>
</body>
</html>
